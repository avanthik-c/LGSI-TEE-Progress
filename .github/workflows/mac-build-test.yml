name: Mac Build Test

on:
  workflow_dispatch:
  push:
    paths:
      - 'Amith/Proper_Benchmark/**'
  pull_request:
    paths:
      - 'Amith/Proper_Benchmark/**'

jobs:
  test-arm64:
    name: Apple Silicon (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show architecture
        run: uname -m

      - name: Build
        run: |
          cd Amith/Proper_Benchmark/mlkem_native_bench
          rm -f bench_mlkem_c bench_mlkem_native
          make all

      - name: Run portable benchmark
        run: |
          cd Amith/Proper_Benchmark/mlkem_native_bench
          ./bench_mlkem_c

      - name: Run native benchmark
        run: |
          cd Amith/Proper_Benchmark/mlkem_native_bench
          ./bench_mlkem_native


